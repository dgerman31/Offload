name: iOS Build

# Compiles Offload on a real Apple Silicon Mac (Xcode 26) every push / PR.
# This is our feedback loop: since the app can't be built on the author's machine,
# CI is the source of truth for "does it compile + do the tests pass".
#
# Speed notes: a normal push only runs the test pass. The unsigned .ipa is a SECOND full
# Release compile, so it's opt-in — add "[ipa]" to the commit message, or run this workflow
# manually from the Actions tab, when you actually want to sideload.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      build_ipa:
        description: "Also build a sideloadable .ipa"
        type: boolean
        default: true

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  # `brew update` alone can cost more than the install itself.
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ANALYTICS: 1

jobs:
  build:
    runs-on: macos-15   # Apple Silicon runner. If a macos-26 image exists, this can be bumped.
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"   # Foundation Models needs the iOS 26 SDK.

      # Fetching + resolving GRDB every run is pure waste; the checkout is deterministic.
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Runner images rotate their simulator sets, so a hardcoded device name eventually
      # disappears and fails the build. Resolve a real UDID instead.
      # (No `pipefail` here on purpose: `head -1` closes the pipe early, which would otherwise
      # kill the upstream command and silently yield an empty id.)
      - name: Pick a simulator
        id: sim
        run: |
          LIST=$(xcrun simctl list devices available)
          echo "$LIST"
          UDID=$(echo "$LIST" | sed -n -E 's/^[[:space:]]*iPhone[^(]*\(([0-9A-Fa-f-]{36})\).*/\1/p' | head -1)
          if [ -z "$UDID" ]; then echo "::error::No iPhone simulator available on this runner"; exit 1; fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      # `test` already builds — the old `clean build test` compiled the world twice, and
      # `clean` is meaningless on a fresh runner that has no derived data to begin with.
      # No `||` retry on a second device: it doubled the cost of every genuine test failure.
      - name: Test (Simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Offload.xcodeproj \
            -scheme Offload \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify

      # Build an UNSIGNED .ipa for sideloading. Sideloadly/AltStore re-sign it with the
      # user's free Apple ID at install time, so no signing is needed here.
      - name: Build unsigned .ipa
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ipa]')
        run: |
          set -o pipefail
          xcodebuild \
            -project Offload.xcodeproj \
            -scheme Offload \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build | xcbeautify
          APP="build/Build/Products/Release-iphoneos/Offload.app"
          test -d "$APP" || { echo "App not found at $APP"; exit 1; }
          rm -rf Payload Offload.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Offload.ipa Payload
          ls -lh Offload.ipa

      - name: Upload .ipa artifact
        if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ipa]')
        uses: actions/upload-artifact@v4
        with:
          name: Offload-ipa
          path: Offload.ipa
          if-no-files-found: error
          retention-days: 14
