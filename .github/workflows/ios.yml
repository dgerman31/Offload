name: iOS Build

# Compiles Offload on a real Apple Silicon Mac (Xcode 26) every push / PR.
# This is our feedback loop: since the app can't be built on the author's machine,
# CI is the source of truth for "does it compile + do the tests pass".
#
# Speed notes: a normal push only runs the test pass. The unsigned .ipa is a SECOND full
# Release compile, so it's opt-in — add "[ipa]" to the commit message, or run this workflow
# manually from the Actions tab, when you actually want to sideload.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      build_ipa:
        description: "Also build a sideloadable .ipa"
        type: boolean
        default: true

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  # `brew update` alone can cost more than the install itself.
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  HOMEBREW_NO_ANALYTICS: 1

jobs:
  # Test and .ipa are SEPARATE, parallel jobs. They used to be one job doing two full compiles
  # back to back (Debug for the tests, then Release for the .ipa), which landed right on the
  # 12-minute timeout and got the .ipa guillotined mid-build. Splitting them gives each its own
  # clock and its own runner, so a legit build finishes and neither starves the other.
  test:
    runs-on: macos-15   # Apple Silicon runner. If a macos-26 image exists, this can be bumped.
    # A normal run is ~8–11 min (simulator cold boot + package resolution + the test suite
    # itself, which has grown over time) — 16 gives that real headroom without letting a
    # genuine hang run away.
    timeout-minutes: 16
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"   # Foundation Models needs the iOS 26 SDK.

      # Fetching + resolving GRDB every run is pure waste; the checkout is deterministic.
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Runner images rotate their simulator sets, so a hardcoded device name eventually
      # vanishes. Pick a real one — but only from an iOS 26 runtime, since anything older
      # can't satisfy the deployment target and xcodebuild will reject it as a destination.
      # (simctl groups devices under `-- iOS 26.2 --` headers, hence the awk state machine.
      # `-showdestinations` isn't reliable here: it returns only placeholders when
      # CoreSimulator hasn't enumerated yet.)
      - name: Pick a simulator
        id: sim
        run: |
          LIST=$(xcrun simctl list devices available)
          echo "$LIST"
          # Prefer a mainstream Pro handset — the exotic ones (Air, SE, "e" variants) are the
          # ones that tend to hang on first boot. Fall back to any iOS 26 iPhone.
          pick() {
            echo "$LIST" | awk -v want="$1" '
              /^-- iOS 26/ { ok = 1; next }
              /^-- /       { ok = 0; next }
              ok && index($0, want) {
                if (match($0, /[0-9A-Fa-f-]{36}/)) { print substr($0, RSTART, RLENGTH); exit }
              }'
          }
          UDID=$(pick "iPhone 17 Pro")
          [ -z "$UDID" ] && UDID=$(pick "iPhone 16 Pro")
          [ -z "$UDID" ] && UDID=$(pick "iPhone")
          if [ -z "$UDID" ]; then echo "::error::No iOS 26 iPhone simulator on this runner"; exit 1; fi

          # Best-effort head start on booting — but don't wait on `bootstatus -b` here. It
          # turns out to hang outright on this runner (confirmed: the job ran to its full
          # timeout sitting on that exact line, once a since-fixed no-op `timeout` wrapper
          # stopped accidentally masking the hang). `xcodebuild test` boots and waits for the
          # simulator itself as part of running the tests, which is its normal, reliable job —
          # no separate pre-check needed.
          xcrun simctl boot "$UDID" 2>/dev/null || true

          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      # `test` already builds — the old `clean build test` compiled the world twice, and
      # `clean` is meaningless on a fresh runner that has no derived data to begin with.
      # No `||` retry on a second device: it doubled the cost of every genuine test failure.
      - name: Test (Simulator)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Offload.xcodeproj \
            -scheme Offload \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=YES \
            | xcbeautify

  # Opt-in: only when the commit message carries [ipa], or the workflow is run manually. Runs in
  # parallel with `test` (no `needs:`), so the sideloadable build is ready in ~7–8 min on its own
  # clock instead of racing the test compile for the last minute of a shared timeout.
  ipa:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[ipa]')
    runs-on: macos-15
    # The Release compile alone is ~7–8 min; give it real headroom so it's never cut off, while
    # still bounding a genuine hang.
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Build an UNSIGNED .ipa for sideloading. Sideloadly/AltStore re-sign it with the
      # user's free Apple ID at install time, so no signing is needed here.
      - name: Build unsigned .ipa
        run: |
          set -o pipefail
          xcodebuild \
            -project Offload.xcodeproj \
            -scheme Offload \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build | xcbeautify
          APP="build/Build/Products/Release-iphoneos/Offload.app"
          test -d "$APP" || { echo "App not found at $APP"; exit 1; }
          rm -rf Payload Offload.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Offload.ipa Payload
          ls -lh Offload.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Offload-ipa
          path: Offload.ipa
          if-no-files-found: error
          retention-days: 14
