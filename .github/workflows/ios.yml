name: iOS Build

# Compiles Offload on a real Apple Silicon Mac (Xcode 26) every push / PR.
# This is our feedback loop: since the app can't be built on the author's machine,
# CI is the source of truth for "does it compile + do the tests pass".

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:   # lets you run it manually from the Actions tab

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15   # Apple Silicon runner. If a macos-26 image exists, this can be bumped.
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"   # Foundation Models needs the iOS 26 SDK. Adjust if the runner lists a different 26.x.

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show available simulators
        run: xcrun simctl list devices available | grep -i iphone || true

      - name: Build & test (Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project Offload.xcodeproj \
            -scheme Offload \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            clean build test | xcbeautify || \
          xcodebuild \
            -project Offload.xcodeproj \
            -scheme Offload \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            clean build test

      # Build an UNSIGNED .ipa for sideloading. Sideloadly/AltStore re-sign it with
      # the user's free Apple ID at install time, so no signing is needed here.
      - name: Build unsigned .ipa
        run: |
          set -o pipefail
          xcodebuild \
            -project Offload.xcodeproj \
            -scheme Offload \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build
          APP="build/Build/Products/Release-iphoneos/Offload.app"
          test -d "$APP" || { echo "App not found at $APP"; exit 1; }
          rm -rf Payload Offload.ipa
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry Offload.ipa Payload
          ls -lh Offload.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Offload-ipa
          path: Offload.ipa
          if-no-files-found: error
          retention-days: 14
