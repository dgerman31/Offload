name: Offload
options:
  bundleIdPrefix: com.danielgerman
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

settings:
  base:
    MARKETING_VERSION: "1.9.0"
    CURRENT_PROJECT_VERSION: "37"
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""           # left blank; Sideloadly / your free Apple ID signs at install time
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Offload:
    type: application
    platform: iOS
    sources:
      - path: Offload
    dependencies:
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielgerman.offload
        INFOPLIST_FILE: Offload/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Offload/Resources/Offload.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
    # Swift Package dependencies are added in later increments (e.g. GRDB).

  OffloadTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OffloadTests
    dependencies:
      - target: Offload
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danielgerman.offload.tests
        GENERATE_INFOPLIST_FILE: YES
